<body>

    <button onclick="sumar()">+1</button>
    <script>
        const scoreDisplay = document.querySelector("#score")

        scoreDisplay.textContent= score;

    
        function sumar(){
            score++
            scoreDisplay.te
            localStorage.setItem("score", score)
        }
        
    </script>
